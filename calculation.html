<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculation</title>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Outfit:wght@100..900&display=swap');

        :root{
            --backcolor: hsl(0, 0%, 10%);
            --primary: hsl(0, 0%, 15%);
            --heading: hsl(0, 0%, 95%);
            --text: hsl(0, 0%, 80%);
            --button-hover: hsl(0, 0%, 20%);
            --shadow: 0px 2px 2px hsla(0, 0%, 0%, 0.07),
            0px 4px 4px hsla(0, 0%, 0%, 0.15);
            --theme-color: hsl(0, 0%, 95%);
            
        }

        body.light{
            /*Light theme*/
            --backcolor: hsl(0, 0%, 95%);
            --primary: hsl(0, 0%, 90%);
            --heading: hsl(0, 0%, 15%);
            --text: hsl(0, 0%, 25%);
            --button-hover: hsl(0, 0%, 20%);
            --theme-color: hsl(0, 0%, 95%);
            
        }

        body{
            font-family: outfit;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--backcolor);
            position: relative;
        }


        #theme{
            background-color: #318dde;
            color: var(--theme-color);
            border-radius: 5px;
            position: fixed;
            top: 20px;
            right: 0;
        }


        .box{
            background-color: var(--primary);
            padding: min(1.5em, 6%);
            border-radius: 8px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            color: crimson;
            box-shadow: var(--shadow);
        }
        
        input{
            border-radius: 2px;
            padding: 1.1em;
            font-size: 16px;
            background-color: var(--backcolor);
            color: var(--text);
            margin-left: 5px;
            border: 2px solid var(--primary);
            
        }
        input[type="number"]:focus,
        input[type="text"]:focus{
            outline: none;
            border: 2px solid var(--text);
            box-shadow: 0 0 5px var(--text);
        }
        button{
            font-size: 18px;
            cursor: pointer;
            margin-right: 12px;
            background-color: var(--backcolor);
            color: var(--text);
            border: none;
            padding: 0.4em 0.8em;
            border-radius: 1000px;
        }
        button:hover{
            background-color: var(--backcolor);
            color: var(--text);
            outline: 2px solid var(--text);
            box-shadow: 0 0 5px var(--text);
        }
        h1{
            color: var(--heading);
        }
        h2{
            color: var(--text);
        }
        @media (max-width: 630px){
            
        }
    </style>
</head>
<body>
    <button id="theme" onclick="toggle()">Change Theme</button>
    <div class="box">
        <div class="container">
            <center><h1>Calculator</h1></center>
            <input id="num1" type="number" placeholder="Enter 1st no.">
            <input id="num2" type="number" placeholder="Enter 2nd no.">
            <br><br>
            <button onclick="add()">Add</button>
            <button onclick="sub()">Subtract</button>
            <button onclick="mul()">Multiply</button>
            <button onclick="div()">Divide</button>
            <button onclick="reset()">Reset</button>

            <h1>Result</h1>
            <h2 id="result"></h2>
        </div>
    </div>

    
    
    <script>
        function add() {
            let input1 = document.getElementById('num1').value;
            let input2 = document.getElementById('num2').value;

            let result = parseInt(input1) + parseInt(input2) ;
            
            document.getElementById('result').innerHTML = result;
        }

        function sub() {
            let input1 = document.getElementById('num1').value;
            let input2 = document.getElementById('num2').value;

            let result = parseInt(input1) - parseInt(input2) ;
            
            document.getElementById('result').innerHTML = result;
        }

        function mul() {
            let input1 = document.getElementById('num1').value;
            let input2 = document.getElementById('num2').value;

            let result = parseInt(input1) * parseInt(input2) ;
            
            document.getElementById('result').innerHTML = result;
        }

        function div() {
            let input1 = document.getElementById('num1').value;
            let input2 = document.getElementById('num2').value;

            let result = parseInt(input1) / parseInt(input2) ;
            
            document.getElementById('result').innerHTML = result;
        }


        function reset() {
            document.getElementById('num1').value = null;
            document.getElementById('num2').value = null;
            document.getElementById('result').innerHTML = null;
        }

        function toggle() {
            document.body.classList.toggle("light");
            console.log("Theme Changed");
            
        }
    </script>
</body>
</html>
